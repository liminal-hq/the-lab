<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" style="background-color: #1a0b2e;">
  <defs>
    <!-- Halftone Pattern -->
    <pattern id="halftone" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="2" fill="#000" opacity="0.2"/>
    </pattern>
    <!-- Comic Shadow Filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feOffset dx="6" dy="6" in="SourceAlpha" result="offset"/>
      <feFlood flood-color="black"/>
      <feComposite in2="offset" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Alarm glow -->
    <filter id="alarmGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Eye glow -->
    <filter id="eyeGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="#663399"/>
  <rect width="800" height="420" fill="url(#halftone)"/>

  <!-- Diagonal light ray -->
  <path d="M600 0 L800 0 L800 200 Z" fill="white" opacity="0.08"/>

  <!-- ══════ TITLE BANNER ══════ -->
  <g transform="translate(400, 48) rotate(-3)">
    <path d="M-280,-28 L290,-32 L300,26 L-270,30 Z" fill="#ff0055" stroke="black" stroke-width="4" filter="url(#shadow)"/>
    <text x="0" y="8" font-family="Impact, sans-serif" font-size="45" fill="#ffcc00" stroke="black" stroke-width="3" text-anchor="middle">CONTAINMENT BREACH!</text>
  </g>
  <text x="400" y="86" font-family="Comic Sans MS, cursive, sans-serif" font-size="18" fill="white" text-anchor="middle">The rats have escaped into smdu...</text>

  <!-- ══════ ALARM LIGHTS ══════ -->
  <!-- Left alarm -->
  <circle cx="60" cy="115" r="12" fill="#ff0000" filter="url(#alarmGlow)">
    <animate attributeName="opacity" values="1;0.2;1" dur="0.6s" repeatCount="indefinite"/>
  </circle>
  <rect x="55" y="127" width="10" height="20" fill="#444" stroke="black" stroke-width="2"/>

  <!-- Right alarm -->
  <circle cx="740" cy="115" r="12" fill="#ff0000" filter="url(#alarmGlow)">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="0.6s" repeatCount="indefinite"/>
  </circle>
  <rect x="735" y="127" width="10" height="20" fill="#444" stroke="black" stroke-width="2"/>

  <!-- ══════ FLOOR / GROUND ══════ -->
  <rect x="0" y="360" width="800" height="60" fill="#2b2b2b" stroke="black" stroke-width="3"/>
  <line x1="0" y1="360" x2="800" y2="360" stroke="#444" stroke-width="4"/>

  <!-- ══════ LEFT SIDE: BROKEN LAB CAGE ══════ -->
  <g transform="translate(30, 180)" filter="url(#shadow)">
    <!-- Cage back wall -->
    <rect x="0" y="0" width="160" height="150" fill="#333" stroke="black" stroke-width="4" rx="4"/>
    <!-- Interior -->
    <rect x="8" y="8" width="144" height="134" fill="#222"/>
    <!-- Cage bars (some broken/bent) -->
    <line x1="30" y1="0" x2="30" y2="150" stroke="#c0c0c0" stroke-width="4"/>
    <line x1="60" y1="0" x2="60" y2="90" stroke="#c0c0c0" stroke-width="4"/>
    <!-- Broken bar - bent outward -->
    <path d="M60 90 Q75 120 85 150" fill="none" stroke="#c0c0c0" stroke-width="4"/>
    <line x1="90" y1="0" x2="90" y2="80" stroke="#c0c0c0" stroke-width="4"/>
    <!-- Broken bar - bent other way -->
    <path d="M90 80 Q100 110 120 140" fill="none" stroke="#c0c0c0" stroke-width="4"/>
    <line x1="120" y1="0" x2="120" y2="150" stroke="#c0c0c0" stroke-width="4"/>
    <!-- Label plate -->
    <rect x="20" y="155" width="120" height="25" fill="#c0c0c0" stroke="black" stroke-width="2" rx="2"/>
    <text x="80" y="173" font-family="Impact, sans-serif" font-size="14" fill="black" text-anchor="middle">SPECIMEN HOUSING</text>
    <!-- Empty wheel inside (they left!) -->
    <circle cx="80" cy="70" r="30" fill="none" stroke="#555" stroke-width="3"/>
    <circle cx="80" cy="70" r="3" fill="#555"/>
    <!-- "EMPTY" stamp -->
    <text x="80" y="110" font-family="Impact, sans-serif" font-size="22" fill="#aa0000" text-anchor="middle" opacity="0.6" transform="rotate(-15, 80, 100)">EMPTY</text>
  </g>

  <!-- Broken glass shards on floor -->
  <polygon points="170,355 180,340 190,355" fill="#aaddff" stroke="black" stroke-width="1.5" opacity="0.5"/>
  <polygon points="185,358 195,345 200,358" fill="#aaddff" stroke="black" stroke-width="1.5" opacity="0.4"/>
  <polygon points="160,360 165,348 172,360" fill="#aaddff" stroke="black" stroke-width="1.5" opacity="0.3"/>

  <!-- ══════ CENTRE: CABLE/PIPE PATHWAY ══════ -->
  <!-- Network cable running across -->
  <path d="M200 330 C280 330 300 280 380 270 C460 260 500 290 560 280" fill="none" stroke="#555" stroke-width="12" stroke-linecap="round"/>
  <path d="M200 330 C280 330 300 280 380 270 C460 260 500 290 560 280" fill="none" stroke="#666" stroke-width="8" stroke-linecap="round"/>
  <!-- Cable label -->
  <rect x="340" y="240" width="80" height="18" fill="#ffcc00" stroke="black" stroke-width="2" rx="3"/>
  <text x="380" y="254" font-family="Impact, sans-serif" font-size="11" fill="black" text-anchor="middle">CAT-6 CABLE</text>

  <!-- Speed lines along the cable (rats running!) -->
  <path d="M220 310 L280 310" stroke="#ffcc00" stroke-width="2" opacity="0.6" stroke-dasharray="12 8">
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="0.4s" repeatCount="indefinite"/>
  </path>
  <path d="M300 290 L360 290" stroke="#ffcc00" stroke-width="2" opacity="0.6" stroke-dasharray="12 8">
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="0.35s" repeatCount="indefinite"/>
  </path>
  <path d="M420 270 L480 270" stroke="#ffcc00" stroke-width="2" opacity="0.6" stroke-dasharray="12 8">
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="0.45s" repeatCount="indefinite"/>
  </path>

  <!-- ══════ RAT 1: Running along cable (silhouette style) ══════ -->
  <g transform="translate(310, 248) rotate(-8)">
    <!-- Body -->
    <path d="M-20 5 C-10 -15, 25 -15, 40 0 C 45 5, 45 10, 40 12 C 25 18, 5 18, -20 5 Z" fill="black" stroke="white" stroke-width="2.5"/>
    <!-- Tail -->
    <path d="M-20 8 Q-40 5, -45 20" fill="none" stroke="white" stroke-width="2.5"/>
    <!-- Legs -->
    <path d="M0 15 L-5 25" stroke="white" stroke-width="2.5" fill="none"/>
    <path d="M30 12 L35 22" stroke="white" stroke-width="2.5" fill="none"/>
    <!-- Eye -->
    <circle cx="35" cy="2" r="2.5" fill="#ff0000" filter="url(#eyeGlow)">
      <animate attributeName="opacity" values="1;0.4;1" dur="0.25s" repeatCount="indefinite"/>
    </circle>
    <!-- Ears -->
    <circle cx="30" cy="-8" r="5" fill="black" stroke="white" stroke-width="1.5"/>
  </g>

  <!-- ══════ RAT 2: Smaller, following behind ══════ -->
  <g transform="translate(250, 310) rotate(-5)">
    <path d="M-14 4 C-7 -10, 18 -10, 28 0 C 32 4, 32 7, 28 8 C 18 13, 4 13, -14 4 Z" fill="black" stroke="white" stroke-width="2"/>
    <path d="M-14 6 Q-28 3, -32 14" fill="none" stroke="white" stroke-width="2"/>
    <path d="M0 10 L-3 18" stroke="white" stroke-width="2" fill="none"/>
    <path d="M22 8 L25 16" stroke="white" stroke-width="2" fill="none"/>
    <circle cx="24" cy="1" r="2" fill="#ff0000" filter="url(#eyeGlow)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="0.3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ══════ RAT 3: Goggle rat climbing into the terminal ══════ -->
  <g transform="translate(590, 240)">
    <!-- Body -->
    <path d="M0 50 Q20 10 40 0 Q50 -5 55 5 Q60 20 40 50 Z" fill="#999" stroke="black" stroke-width="3"/>
    <!-- Head -->
    <circle cx="48" cy="-10" r="18" fill="#999" stroke="black" stroke-width="3"/>
    <!-- Ears -->
    <circle cx="36" cy="-24" r="8" fill="#ffcccc" stroke="black" stroke-width="2"/>
    <circle cx="60" cy="-24" r="8" fill="#ffcccc" stroke="black" stroke-width="2"/>
    <!-- Goggles -->
    <rect x="34" y="-18" width="12" height="10" rx="3" fill="#aaddff" stroke="black" stroke-width="2"/>
    <rect x="50" y="-18" width="12" height="10" rx="3" fill="#aaddff" stroke="black" stroke-width="2"/>
    <path d="M46 -13 L50 -13" stroke="black" stroke-width="2"/>
    <path d="M30 -13 L34 -13" stroke="black" stroke-width="2"/>
    <!-- Glare -->
    <rect x="36" y="-16" width="4" height="2" fill="white" opacity="0.6" rx="1"/>
    <!-- Snout -->
    <ellipse cx="48" cy="-2" rx="5" ry="4" fill="#ffaaaa" stroke="black" stroke-width="1.5"/>
    <!-- Whiskers -->
    <path d="M42 -2 L30 -6" stroke="black" stroke-width="1.5"/>
    <path d="M42 0 L30 4" stroke="black" stroke-width="1.5"/>
    <path d="M54 -2 L66 -6" stroke="black" stroke-width="1.5"/>
    <path d="M54 0 L66 4" stroke="black" stroke-width="1.5"/>
    <!-- Tail -->
    <path d="M5 50 Q-15 60 -10 75" fill="none" stroke="#ffaaaa" stroke-width="3" stroke-linecap="round"/>
    <!-- Hands reaching into monitor -->
    <circle cx="60" cy="10" r="5" fill="#ffcccc" stroke="black" stroke-width="2"/>
  </g>

  <!-- ══════ RIGHT SIDE: smdu TERMINAL ══════ -->
  <g transform="translate(610, 145)" filter="url(#shadow)">
    <!-- Monitor housing -->
    <rect x="0" y="0" width="170" height="130" fill="#222" stroke="black" stroke-width="4" rx="6"/>
    <!-- Screen -->
    <rect x="8" y="8" width="154" height="114" fill="#003300" rx="3"/>
    <!-- smdu terminal output -->
    <text x="16" y="28" font-family="monospace" font-size="11" fill="#0f0" font-weight="bold">$ smdu ~/projects</text>
    <text x="16" y="44" font-family="monospace" font-size="11" fill="#0f0" font-weight="bold">  scanning...</text>
    <text x="16" y="60" font-family="monospace" font-size="11" fill="#0f0" font-weight="bold">  node_modules/ 847MB</text>
    <text x="16" y="76" font-family="monospace" font-size="11" fill="#0f0" font-weight="bold">  src/         12MB</text>
    <text x="16" y="92" font-family="monospace" font-size="10" fill="#ff0000" font-weight="bold">  WARNING: RATS DETECTED</text>
    <text x="16" y="108" font-family="monospace" font-size="11" fill="#0f0" font-weight="bold">&gt; _</text>
    <!-- Blinking cursor -->
    <rect x="28" y="98" width="8" height="12" fill="#0f0">
      <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <!-- Monitor stand -->
    <rect x="65" y="130" width="40" height="15" fill="#333" stroke="black" stroke-width="3"/>
    <path d="M40 145 L130 145 L120 155 L50 155 Z" fill="#444" stroke="black" stroke-width="3"/>
  </g>

  <!-- ══════ PAW PRINTS (trail from cage to terminal) ══════ -->
  <g opacity="0.2" fill="#654321">
    <!-- Print 1 -->
    <circle cx="205" cy="348" r="4"/>
    <circle cx="201" cy="342" r="2"/><circle cx="209" cy="342" r="2"/>
    <circle cx="198" cy="338" r="1.5"/><circle cx="212" cy="338" r="1.5"/>
    <!-- Print 2 -->
    <circle cx="350" cy="340" r="4"/>
    <circle cx="346" cy="334" r="2"/><circle cx="354" cy="334" r="2"/>
    <circle cx="343" cy="330" r="1.5"/><circle cx="357" cy="330" r="1.5"/>
    <!-- Print 3 -->
    <circle cx="480" cy="345" r="4"/>
    <circle cx="476" cy="339" r="2"/><circle cx="484" cy="339" r="2"/>
    <circle cx="473" cy="335" r="1.5"/><circle cx="487" cy="335" r="1.5"/>
    <!-- Print 4 (near monitor) -->
    <circle cx="600" cy="350" r="4"/>
    <circle cx="596" cy="344" r="2"/><circle cx="604" cy="344" r="2"/>
    <circle cx="593" cy="340" r="1.5"/><circle cx="607" cy="340" r="1.5"/>
  </g>

  <!-- ══════ SPEECH BUBBLE from goggle rat ══════ -->
  <g filter="url(#shadow)">
    <path d="M440 130 L590 130 L590 200 L520 200 L500 220 L510 200 L440 200 Z" fill="white" stroke="black" stroke-width="3"/>
    <text x="460" y="155" font-family="Comic Sans MS, cursive, sans-serif" font-size="14" fill="black">We live here now.</text>
    <text x="460" y="175" font-family="Comic Sans MS, cursive, sans-serif" font-size="14" fill="black">Nice terminal!</text>
    <text x="460" y="195" font-family="Comic Sans MS, cursive, sans-serif" font-size="12" fill="#666">*chews on cable*</text>
  </g>

  <!-- ══════ BOTTOM CAPTION ══════ -->
  <text x="400" y="400" font-family="Comic Sans MS, cursive, sans-serif" font-size="14" fill="white" text-anchor="middle" opacity="0.6">Incident Report #42: Subjects last seen entering node_modules/ink/build/</text>

  <!-- ══════ TINY RAT PEEKING from bottom edge ══════ -->
  <g transform="translate(750, 390)">
    <circle cx="0" cy="0" r="10" fill="#999" stroke="black" stroke-width="2"/>
    <circle cx="-5" cy="-6" r="5" fill="#ffcccc" stroke="black" stroke-width="1.5"/>
    <circle cx="5" cy="-6" r="5" fill="#ffcccc" stroke="black" stroke-width="1.5"/>
    <circle cx="-3" cy="-1" r="2" fill="white"/>
    <circle cx="-3" cy="-1" r="1" fill="black"/>
    <circle cx="3" cy="-1" r="2" fill="white"/>
    <circle cx="3" cy="-1" r="1" fill="black"/>
    <ellipse cx="0" cy="4" rx="3" ry="2" fill="#ffaaaa"/>
    <line x1="-5" y1="3" x2="-15" y2="0" stroke="black" stroke-width="1"/>
    <line x1="-5" y1="5" x2="-15" y2="8" stroke="black" stroke-width="1"/>
    <line x1="5" y1="3" x2="15" y2="0" stroke="black" stroke-width="1"/>
    <line x1="5" y1="5" x2="15" y2="8" stroke="black" stroke-width="1"/>
  </g>

</svg>
