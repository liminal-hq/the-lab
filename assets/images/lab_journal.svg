<svg width="800" height="760" viewBox="0 0 800 760" xmlns="http://www.w3.org/2000/svg" style="background-color: #2b2b2b;">
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#444" stroke-width="2"/>
    </pattern>
    <filter id="paper-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="4" dy="4" result="offsetblur"/>
      <feComponentTransfer>
         <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="offsetblur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="760" fill="#2b2b2b"/>
  <rect width="800" height="760" fill="url(#grid)"/>

  <!-- Clipboard -->
  <g transform="translate(180, 25) rotate(-3)">
    <rect x="0" y="0" width="440" height="700" rx="5" fill="#8B4513" stroke="black" stroke-width="3" filter="url(#paper-shadow)"/> <!-- Board -->
    <rect x="20" y="40" width="400" height="640" fill="#fffff0" stroke="none"/> <!-- Paper -->

    <!-- Clip -->
    <rect x="150" y="-10" width="140" height="40" rx="5" fill="#c0c0c0" stroke="black" stroke-width="3"/>
    <circle cx="220" cy="10" r="8" fill="#333"/>

    <!-- Paper Lines -->
    <g stroke="#add8e6" stroke-width="2">
      <line x1="40" y1="80" x2="400" y2="80"/>
      <line x1="40" y1="110" x2="400" y2="110"/>
      <line x1="40" y1="140" x2="400" y2="140"/>
      <line x1="40" y1="170" x2="400" y2="170"/>
      <line x1="40" y1="200" x2="400" y2="200"/>
      <line x1="40" y1="230" x2="400" y2="230"/>
      <line x1="40" y1="260" x2="400" y2="260"/>
      <line x1="40" y1="290" x2="400" y2="290"/>
      <line x1="40" y1="320" x2="400" y2="320"/>
      <line x1="40" y1="350" x2="400" y2="350"/>
      <line x1="40" y1="380" x2="400" y2="380"/>
      <line x1="40" y1="410" x2="400" y2="410"/>
      <line x1="40" y1="440" x2="400" y2="440"/>
      <line x1="40" y1="470" x2="400" y2="470"/>
      <line x1="40" y1="500" x2="400" y2="500"/>
      <line x1="40" y1="530" x2="400" y2="530"/>
      <line x1="40" y1="560" x2="400" y2="560"/>
      <line x1="40" y1="590" x2="400" y2="590"/>
      <line x1="40" y1="620" x2="400" y2="620"/>
      <line x1="40" y1="650" x2="400" y2="650"/>
    </g>

    <!-- Content -->
    <text x="50" y="75" font-family="Comic Sans MS, cursive, sans-serif" font-size="24" fill="#000080">Project Log: Rat Cleanup Wave</text>

    <g>
      <text x="50" y="105" font-family="Comic Sans MS, cursive, sans-serif" font-size="18" fill="#333">1. Built new rat maze.</text>
      <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze"/>
    </g>
    <g>
      <text x="50" y="135" font-family="Comic Sans MS, cursive, sans-serif" font-size="18" fill="#333">2. Calibrated sensors.</text>
      <animate attributeName="opacity" values="0;1" begin="0.5s" dur="0.5s" fill="freeze"/>
    </g>
    <g>
      <text x="50" y="165" font-family="Comic Sans MS, cursive, sans-serif" font-size="18" fill="#333">3. Added Coffee Speed Boost.</text>
      <animate attributeName="opacity" values="0;1" begin="1.0s" dur="0.5s" fill="freeze"/>
    </g>
    <g>
      <text x="50" y="195" font-family="Comic Sans MS, cursive, sans-serif" font-size="18" fill="#333">4. Palette-Rat a11y polish.</text>
      <animate attributeName="opacity" values="0;1" begin="1.5s" dur="0.5s" fill="freeze"/>
    </g>
    <g>
      <text x="50" y="225" font-family="Comic Sans MS, cursive, sans-serif" font-size="18" fill="#333">5. District tune + trash chew audio.</text>
      <animate attributeName="opacity" values="0;1" begin="2.0s" dur="0.5s" fill="freeze"/>
    </g>
    <g>
      <text x="50" y="255" font-family="Comic Sans MS, cursive, sans-serif" font-size="18" fill="#333">6. Music starts on any control.</text>
      <animate attributeName="opacity" values="0;1" begin="2.5s" dur="0.5s" fill="freeze"/>
    </g>
    <g>
      <text x="50" y="285" font-family="Comic Sans MS, cursive, sans-serif" font-size="18" fill="#333">7. Rat King added regression guards.</text>
      <animate attributeName="opacity" values="0;1" begin="3.0s" dur="0.5s" fill="freeze"/>
    </g>
    <g>
      <text x="50" y="315" font-family="Comic Sans MS, cursive, sans-serif" font-size="18" fill="#333">8. Attribution audit for "Rats" credits.</text>
      <animate attributeName="opacity" values="0;1" begin="3.5s" dur="0.5s" fill="freeze"/>
    </g>
    <g>
      <text x="50" y="345" font-family="Comic Sans MS, cursive, sans-serif" font-size="18" fill="#333">9. Mega PR whisker sweep started.</text>
      <animate attributeName="opacity" values="0;1" begin="4.0s" dur="0.5s" fill="freeze"/>
    </g>
    <g>
      <text x="50" y="375" font-family="Comic Sans MS, cursive, sans-serif" font-size="18" fill="#333">10. Fold pile sorted into tidy cardboard bins.</text>
      <animate attributeName="opacity" values="0;1" begin="4.5s" dur="0.5s" fill="freeze"/>
    </g>
    <g>
      <text x="50" y="405" font-family="Comic Sans MS, cursive, sans-serif" font-size="18" fill="#333">11. Third-level tunnel saved for later.</text>
      <animate attributeName="opacity" values="0;1" begin="5.0s" dur="0.5s" fill="freeze"/>
    </g>
    <g>
      <text x="50" y="435" font-family="Comic Sans MS, cursive, sans-serif" font-size="18" fill="#333">12. Old squeaks packed up for closing.</text>
      <animate attributeName="opacity" values="0;1" begin="5.5s" dur="0.5s" fill="freeze"/>
    </g>
    <g>
      <text x="50" y="465" font-family="Comic Sans MS, cursive, sans-serif" font-size="18" fill="#333">13. Squeak controls &amp; modal touch polished.</text>
      <animate attributeName="opacity" values="0;1" begin="6.0s" dur="0.5s" fill="freeze"/>
    </g>
    <g>
      <text x="50" y="495" font-family="Comic Sans MS, cursive, sans-serif" font-size="18" fill="#333">14. </text>
      <!-- Typing effect cursor -->
      <rect x="84" y="480" width="2" height="18" fill="black">
        <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- Stamp -->
    <g transform="translate(292, 575) rotate(-15)">
      <rect x="0" y="0" width="100" height="50" rx="5" fill="none" stroke="#aa0000" stroke-width="5" opacity="0.35"/>
      <text x="50" y="35" font-family="Impact, sans-serif" font-size="28" fill="#aa0000" text-anchor="middle" opacity="0.35">SORTED</text>
    </g>

    <!-- Cleanup Crew -->
    <g transform="translate(52, 520)">
      <rect x="0" y="85" width="88" height="56" fill="#c49a6c" stroke="#5b3a1e" stroke-width="3"/>
      <rect x="12" y="70" width="64" height="18" fill="#d8b186" stroke="#5b3a1e" stroke-width="3"/>
      <text x="44" y="108" font-family="Comic Sans MS, cursive, sans-serif" font-size="14" fill="#5b3a1e" text-anchor="middle">SORTED</text>
      <text x="44" y="128" font-family="Comic Sans MS, cursive, sans-serif" font-size="14" fill="#5b3a1e" text-anchor="middle">PRS</text>
      <ellipse cx="165" cy="108" rx="32" ry="20" fill="#6f7b86" stroke="#222" stroke-width="3"/>
      <circle cx="147" cy="92" r="11" fill="#6f7b86" stroke="#222" stroke-width="3"/>
      <circle cx="139" cy="79" r="5" fill="#6f7b86" stroke="#222" stroke-width="3"/>
      <circle cx="154" cy="77" r="5" fill="#6f7b86" stroke="#222" stroke-width="3"/>
      <circle cx="143" cy="92" r="2.5" fill="#111"/>
      <circle cx="151" cy="92" r="2.5" fill="#111"/>
      <path d="M144 99 Q147 104 150 99" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M196 89 L226 57" stroke="#5b3a1e" stroke-width="5" stroke-linecap="round"/>
      <path d="M223 56 L244 62 L228 84 Z" fill="#d9c27a" stroke="#5b3a1e" stroke-width="3"/>
      <path d="M196 121 Q224 138 246 126" fill="none" stroke="#c98f5b" stroke-width="4" stroke-linecap="round"/>
      <path d="M260 70 L336 70" stroke="#f4d03f" stroke-width="10" stroke-dasharray="12 8"/>
      <text x="298" y="58" font-family="Impact, sans-serif" font-size="16" fill="#b8860b" text-anchor="middle">3RD LEVEL</text>
    </g>

    <!-- Rat Paw Prints -->
    <g transform="translate(340, 630) rotate(30)" fill="#654321" opacity="0.7">
      <circle cx="20" cy="20" r="8"/>
      <circle cx="10" cy="8" r="3"/>
      <circle cx="20" cy="4" r="3"/>
      <circle cx="30" cy="8" r="3"/>
    </g>
    <g transform="translate(370, 610) rotate(45)" fill="#654321" opacity="0.7">
      <circle cx="20" cy="20" r="8"/>
      <circle cx="10" cy="8" r="3"/>
      <circle cx="20" cy="4" r="3"/>
      <circle cx="30" cy="8" r="3"/>
    </g>
  </g>

  <!-- Title Text -->
  <text x="760" y="710" font-family="Impact, sans-serif" font-size="45" fill="#ffcc00" stroke="black" stroke-width="2" text-anchor="end" transform="rotate(-5 760 710)">LIVING JOURNAL</text>
  <text x="760" y="735" font-family="Comic Sans MS, cursive, sans-serif" font-size="16" fill="#fff" text-anchor="end" transform="rotate(-5 760 735)">UPDATED DAILY(ISH)</text>

</svg>
